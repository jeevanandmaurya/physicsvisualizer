<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysicsVisualizer Codebase Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #graph {
            width: 100%;
            height: 80vh;
            border: 1px solid #ccc;
            background-color: white;
        }
        .node {
            cursor: pointer;
        }
        .node circle {
            stroke: #fff;
            stroke-width: 2px;
        }
        .node text {
            font-size: 12px;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .link {
            stroke: #999;
            stroke-opacity: 0.8;
        }
        .tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 5px;
            pointer-events: none;
            font-size: 12px;
            max-width: 200px;
        }
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h2>PhysicsVisualizer Codebase Graph</h2>
     <button onclick="resetZoom()">Reset Zoom</button>
    <div id="graph"></div>
    <div class="legend">
        <div style="margin-bottom: 10px; font-weight: bold;">Priority Levels:</div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #e74c3c; border: 3px solid #c0392b;"></div>
            <span>Critical (Core Engine)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #3498db;"></div>
            <span>High (UI Logic)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #f39c12;"></div>
            <span>Medium (Assets/Tools)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #95a5a6;"></div>
            <span>Low (Utils/Tests)</span>
        </div>
        <div style="margin-top: 15px; margin-bottom: 10px; font-weight: bold;">Relationships:</div>
        <div class="legend-item">
            <div style="width: 20px; height: 2px; background-color: #666; margin-right: 10px;"></div>
            <span>Hierarchy</span>
        </div>
        <div class="legend-item">
            <div style="width: 20px; height: 4px; background-color: #e74c3c; margin-right: 10px; border-style: dashed; border-width: 1px 0;"></div>
            <span>Critical Dependency</span>
        </div>
        <div class="legend-item">
            <div style="width: 20px; height: 3px; background-color: #f39c12; margin-right: 10px; border-style: dashed; border-width: 1px 0;"></div>
            <span>High Dependency</span>
        </div>
    </div>

    <script>
        const data = {
            nodes: [
                { id: "root", name: "physicsvisualizer", purpose: "Root project - Physics learning platform", priority: "critical", group: "root" },
                { id: "src", name: "src", purpose: "Source code", priority: "critical", group: "core" },
                { id: "public", name: "public", purpose: "Static assets and scenes", priority: "medium", group: "assets" },
                { id: "tests", name: "tests", purpose: "Test suite", priority: "low", group: "tests" },
                { id: "backup", name: "backup", purpose: "Legacy components", priority: "low", group: "backup" },
                { id: "core", name: "core", purpose: "Core engine components", priority: "critical", group: "core" },
                { id: "contexts", name: "contexts", purpose: "React state management", priority: "critical", group: "core" },
                { id: "ui-logic", name: "ui-logic", purpose: "UI business logic", priority: "high", group: "ui" },
                { id: "utils", name: "utils", purpose: "Utility functions", priority: "medium", group: "utils" },
                { id: "views", name: "views", purpose: "Main UI views", priority: "high", group: "ui" },
                { id: "workbench", name: "workbench", purpose: "Main app layout", priority: "high", group: "ui" },
                { id: "physics", name: "physics", purpose: "Rapier3D physics engine", priority: "critical", group: "core" },
                { id: "scene", name: "scene", purpose: "Scene management & patching", priority: "critical", group: "core" },
                { id: "ai", name: "ai", purpose: "Gemini AI integration", priority: "critical", group: "core" },
                { id: "database", name: "database", purpose: "IndexedDB persistence", priority: "critical", group: "core" },
                { id: "tools", name: "tools", purpose: "Scene creation tools", priority: "medium", group: "core" },
                { id: "visuals", name: "visuals", purpose: "Visual components", priority: "medium", group: "core" },
                { id: "workers", name: "workers", purpose: "Web workers (planned for performance)", priority: "low", group: "core" },
                { id: "workspace", name: "workspace", purpose: "Workspace management", priority: "high", group: "core" },
                { id: "chat", name: "chat", purpose: "Chat UI logic", priority: "high", group: "ui" },
                { id: "scene-management", name: "scene-management", purpose: "Scene management UI", priority: "high", group: "ui" },
                { id: "visualizer", name: "visualizer", purpose: "3D visualizer with physics rendering & camera controls", priority: "high", group: "ui" },
                { id: "scenes", name: "scenes", purpose: "Pre-built physics scenes", priority: "medium", group: "assets" }
            ],
            links: [
                // Hierarchy
                { source: "root", target: "src", type: "hierarchy" },
                { source: "root", target: "public", type: "hierarchy" },
                { source: "root", target: "tests", type: "hierarchy" },
                { source: "root", target: "backup", type: "hierarchy" },
                { source: "src", target: "core", type: "hierarchy" },
                { source: "src", target: "contexts", type: "hierarchy" },
                { source: "src", target: "ui-logic", type: "hierarchy" },
                { source: "src", target: "utils", type: "hierarchy" },
                { source: "src", target: "views", type: "hierarchy" },
                { source: "src", target: "workbench", type: "hierarchy" },
                { source: "core", target: "physics", type: "hierarchy" },
                { source: "core", target: "scene", type: "hierarchy" },
                { source: "core", target: "ai", type: "hierarchy" },
                { source: "core", target: "database", type: "hierarchy" },
                { source: "core", target: "tools", type: "hierarchy" },
                { source: "core", target: "visuals", type: "hierarchy" },
                { source: "core", target: "workers", type: "hierarchy" },
                { source: "core", target: "workspace", type: "hierarchy" },
                { source: "ui-logic", target: "chat", type: "hierarchy" },
                { source: "ui-logic", target: "scene-management", type: "hierarchy" },
                { source: "ui-logic", target: "visualizer", type: "hierarchy" },
                { source: "public", target: "scenes", type: "hierarchy" },
                
                // Critical Dependencies
                { source: "workbench", target: "contexts", type: "depends", strength: "critical" },
                { source: "workbench", target: "views", type: "depends", strength: "critical" },
                { source: "contexts", target: "database", type: "depends", strength: "critical" },
                { source: "contexts", target: "scene", type: "depends", strength: "critical" },
                { source: "views", target: "physics", type: "depends", strength: "critical" },
                { source: "views", target: "scene", type: "depends", strength: "critical" },
                { source: "views", target: "ai", type: "depends", strength: "critical" },
                { source: "ai", target: "scene", type: "modifies", strength: "critical" },
                { source: "visuals", target: "physics", type: "reads", strength: "high" },
                { source: "ui-logic", target: "core", type: "depends", strength: "high" },
                { source: "tools", target: "scene", type: "creates", strength: "medium" }
            ]
        };

        const width = window.innerWidth - 40;
        const height = window.innerHeight * 0.8;

        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", function(event) {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        const g = svg.append("g");

        function resetZoom() {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        }

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(d => {
                // Critical nodes need more space
                const sourceRadius = d.source.priority === "critical" ? 30 : d.source.priority === "high" ? 20 : 12;
                const targetRadius = d.target.priority === "critical" ? 30 : d.target.priority === "high" ? 20 : 12;
                return sourceRadius + targetRadius + 50;
            }))
            .force("charge", d3.forceManyBody().strength(d => d.priority === "critical" ? -800 : -400))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => {
                if (d.priority === "critical") return 35;
                if (d.priority === "high") return 25;
                if (d.priority === "medium") return 15;
                return 10;
            }));

        const link = g.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(data.links)
            .enter().append("line")
            .attr("class", "link")
            .attr("stroke-width", d => {
                if (d.type === "hierarchy") return 2;
                if (d.strength === "critical") return 4;
                if (d.strength === "high") return 3;
                return 2;
            })
            .attr("stroke", d => {
                if (d.type === "hierarchy") return "#666";
                if (d.strength === "critical") return "#e74c3c";
                if (d.strength === "high") return "#f39c12";
                return "#95a5a6";
            })
            .attr("stroke-dasharray", d => {
                if (d.type === "hierarchy") return "none";
                return "5,5";
            });

        const node = g.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(data.nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.append("circle")
            .attr("r", d => {
                if (d.priority === "critical") return 30;
                if (d.priority === "high") return 20;
                if (d.priority === "medium") return 12;
                return 8;
            })
            .attr("fill", d => {
                if (d.group === "core") return "#e74c3c"; // Red for core
                if (d.group === "ui") return "#3498db"; // Blue for UI
                if (d.group === "assets") return "#f39c12"; // Orange for assets
                if (d.group === "root") return "#9b59b6"; // Purple for root
                return "#95a5a6"; // Gray for others
            })
            .attr("stroke", d => d.priority === "critical" ? "#c0392b" : "#34495e")
            .attr("stroke-width", d => d.priority === "critical" ? 3 : 2);

        node.append("text")
            .text(d => d.name)
            .attr("dy", d => d.priority === "critical" ? 40 : d.priority === "high" ? 30 : 20)
            .style("font-size", d => d.priority === "critical" ? "14px" : d.priority === "high" ? "12px" : "10px")
            .style("font-weight", d => d.priority === "critical" ? "bold" : "normal");

        const tooltip = d3.select("body").append("div")
            .attr("class", "tooltip")
            .style("opacity", 0);

        node.on("mouseover", function(event, d) {
            tooltip.transition()
                .duration(200)
                .style("opacity", .9);
            tooltip.html(`<strong>${d.name}</strong><br>Purpose: ${d.purpose}<br>Priority: ${d.priority.charAt(0).toUpperCase() + d.priority.slice(1)}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 28) + "px");
        })
        .on("mouseout", function(d) {
            tooltip.transition()
                .duration(500)
                .style("opacity", 0);
        });

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            const transform = d3.zoomTransform(svg.node());
            d.fx = transform.invertX(event.x);
            d.fy = transform.invertY(event.y);
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
    </script>
</body>
</html>
